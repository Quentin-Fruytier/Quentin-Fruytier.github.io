---
layout: default
---
<div class="content-wrap post">
  <p><heading>{{ page.title }}</heading></p>
  <p class="post-meta">{{ page.date | date: "%B %-d, %Y" }}{% if page.repo %} &middot; <a href="{{ page.repo }}">Code</a>{% endif %}</p>

  {{ content }}

  <p class="post-back"><a href="{{ '/blog/' | relative_url }}">&larr; Back to all posts</a></p>
</div>
{% if page.math %}
<script type="text/javascript" async
  src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.7/MathJax.js?config=TeX-MML-AM_CHTML"></script>
{% endif %}
